# config.yaml — Fraud Detection System

# ── Features ──────────────────────────────────────────────────────────────────
features:
  # Optional: list actual column names here so feature importance CSV is readable.
  # Leave as null to use generic f0, f1, … labels.
  names: null          # e.g. ["V1","V2",...,"V28","Amount","hour_of_day"]

# ── Data pipeline ─────────────────────────────────────────────────────────────
data:
  raw_path:     "data/raw/creditcard.csv"
  test_size:    0.15
  val_size:     0.15
  random_state: 42

# ── Training ──────────────────────────────────────────────────────────────────
training:
  # Fallback values used when Optuna is disabled
  n_estimators:     500
  max_depth:        6
  learning_rate:    0.05
  scale_pos_weight: 577       # ≈ negatives / positives in training set
  min_precision:    0.3      # CI/CD gate — deploy blocked below this
  fbeta_beta:       0.5       # threshold tuning: beta<1 → favour precision
 
# ── Cross-validation ──────────────────────────────────────────────────────────
cross_validation:
  n_splits: 5

# ── Optuna ────────────────────────────────────────────────────────────────────
optuna:
  enabled:         true
  n_trials:        50         # increase for better tuning, decrease for speed
  timeout_seconds: null       # set e.g. 3600 to cap wall-clock time
  show_progress_bar: true

# ── Model artefacts ───────────────────────────────────────────────────────────
model:
  path:      "models/fraud_model.pkl"
  threshold: 0.5              # initial value — overwritten by threshold tuning
  scaler_path: "models/scaler.joblib"

# ── MLflow ────────────────────────────────────────────────────────────────────
mlflow:
  tracking_uri:           "mlruns"           # local; set to remote URI in prod
  experiment_name:        "fraud_detection"
  registered_model_name:  "FraudXGB"

# ── Data drift ────────────────────────────────────────────────────────────────
drift:
  psi_warn_threshold: 0.20    # PSI ≥ this → warning logged & MLflow tag set
  n_bins:             10
