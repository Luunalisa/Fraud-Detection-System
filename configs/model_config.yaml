# configs/model_config.yaml — XGBoost model-specific hyperparameter defaults.
# These are the search bounds used by Optuna (src/models/train_model.py).
# Override by setting optuna.enabled: false and filling training: in config.yaml.

xgboost:
  n_estimators:
    min: 100
    max: 1000
    step: 50
  max_depth:
    min: 3
    max: 10
  learning_rate:
    min: 0.001
    max: 0.3
    log_scale: true
  subsample:
    min: 0.5
    max: 1.0
  colsample_bytree:
    min: 0.5
    max: 1.0
  min_child_weight:
    min: 1
    max: 20
  gamma:
    min: 0.0
    max: 5.0
  reg_alpha:
    min: 0.0001
    max: 10.0
    log_scale: true
  reg_lambda:
    min: 0.0001
    max: 10.0
    log_scale: true
  eval_metric: aucpr
  random_state: 42
